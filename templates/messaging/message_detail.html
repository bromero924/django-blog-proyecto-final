{% extends "base.html" %}

{% block content %}
<h2>Detalle del mensaje</h2>

<p><strong>De:</strong> {{ message.sender }}</p>
<p><strong>Asunto:</strong> {{ message.subject }}</p>
<p><strong>Fecha:</strong> {{ message.created_at }}</p>
<p><strong>Mensaje:</strong></p>
<p>{{ message.body }}</p>

<a href="{% url 'inbox' %}">Volver a inbox</a>
{% endblock %}
